<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#17171f">
<title>BoxVision — Mantenimiento</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:#17171f;
  color:#fff;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  text-align:center;
  overflow:hidden;
  position:relative;
}

/* Orbes de fondo — igual que el splash */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(10,132,255,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 15% 80%,rgba(88,86,214,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 35% 25% at 85% 75%,rgba(255,149,0,0.07) 0%,transparent 60%);
}

/* Ícono */
.icon-wrap{
  position:relative;
  width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
}
.icon-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(circle,rgba(10,132,255,0.3) 0%,transparent 70%);
  border-radius:50%;
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.2);opacity:1}
}
.icon-ring{
  position:absolute;inset:-6px;
  border-radius:50%;
  border:1.5px solid rgba(10,132,255,0.3);
  animation:ringRot 10s linear infinite;
}
.icon-ring::before{
  content:'';position:absolute;
  width:7px;height:7px;background:#0A84FF;border-radius:50%;
  top:-3.5px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 8px 2px rgba(10,132,255,0.6);
}
@keyframes ringRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.icon-bg{
  width:84px;height:84px;border-radius:24px;
  background:linear-gradient(145deg,#1e2d47,#152039);
  border:1px solid rgba(10,132,255,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  font-size:40px;line-height:1;
}

/* Texto */
.title{
  font-size:28px;font-weight:800;letter-spacing:-.6px;
  margin-bottom:10px;
  background:linear-gradient(135deg,#fff 30%,rgba(180,210,255,0.85));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{
  font-size:15px;color:rgba(255,255,255,.55);
  line-height:1.6;max-width:280px;margin:0 auto 36px;
}

/* Tarjeta de estado */
.card{
  background:rgba(255,255,255,.06);
  border:0.5px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:18px 22px;
  display:flex;align-items:center;gap:14px;
  max-width:320px;width:100%;
  margin-bottom:32px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06);
}
.card-dot{
  width:10px;height:10px;border-radius:50%;
  background:#0A84FF;
  flex-shrink:0;
  box-shadow:0 0 8px 2px rgba(10,132,255,.4);
  animation:dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{opacity:.9;transform:scale(1)}
  50%{opacity:.5;transform:scale(.9)}
}
.card-text{
  text-align:left;
}
.card-label{
  font-size:13px;font-weight:700;color:#fff;letter-spacing:.1px;
}
.card-sub{
  font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;
}

/* Indicador de comprobación */
.checking{
  display:flex;align-items:center;gap:10px;
  color:rgba(255,255,255,.35);
  font-size:13px;font-weight:500;
}
.check-spinner{
  width:16px;height:16px;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.1);
  border-top-color:rgba(255,255,255,.35);
  border-radius:50%;
  animation:spin 1.2s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Dots decorativos abajo */
.footer{
  position:fixed;bottom:max(24px,env(safe-area-inset-bottom));
  font-size:12px;color:rgba(255,255,255,.25);
  letter-spacing:.2px;
}

/* Animación de entrada */
.content{
  display:flex;flex-direction:column;align-items:center;
  animation:slideUp .5s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="content">

  <div class="icon-wrap">
    <div class="icon-glow"></div>
    <div class="icon-ring"></div>
    <div class="icon-bg">📦</div>
  </div>

  <div class="title">Volvemos pronto</div>
  <div class="subtitle">Estamos puliendo algunas cosas.<br>No tardaremos mucho.</div>

  <div class="card">
    <div class="card-dot"></div>
    <div class="card-text">
      <div class="card-label">Todo bajo control</div>
      <div class="card-sub">La app estará lista en un momento</div>
    </div>
  </div>

  <div class="checking">
    <div class="check-spinner"></div>
    <span id="checkMsg">Revisando disponibilidad…</span>
  </div>

</div>

<div class="footer">BoxVision · futbol1234now-png.github.io</div>

<script>
(function(){
  var msg = document.getElementById('checkMsg');
  var attempts = 0;
  var maxAttempts = 20;
  var appUrl = location.origin + '/BoxVision/app.html';

  function setMsg(text){ if(msg) msg.textContent = text; }

  function tryReload(){
    attempts++;
    if(attempts > maxAttempts){
      setMsg('Seguimos trabajando en ello…');
      return;
    }
    setMsg('Revisando disponibilidad…');
    fetch(appUrl, {method:'HEAD', cache:'no-store'})
      .then(function(r){
        if(r.ok){
          setMsg('¡Ya está lista! Redirigiendo…');
          setTimeout(function(){ window.location.href = appUrl; }, 800);
        } else {
          setMsg('Aún no está lista, seguimos…');
        }
      })
      .catch(function(){
        setMsg('Revisando disponibilidad…');
      });
  }

  // Primera comprobación a los 10s, luego cada 30s
  setTimeout(tryReload, 10000);
  setInterval(tryReload, 30000);
})();
</script>
</body>
</html>
