<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Cajas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
}

.primary {
  background: white;
  color: #0f172a;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>📦 Mis Cajas</header>

<button class="primary" onclick="createBox()">+ Nueva Caja</button>

<div id="boxes"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let boxes = JSON.parse(localStorage.getItem("boxes")) || [];

function save() {
  try {
    localStorage.setItem("boxes", JSON.stringify(boxes));
  } catch(e) {
    alert("Demasiados datos");
  }
}

function render() {
  const container = document.getElementById("boxes");
  container.innerHTML = "";

  boxes.forEach(box => {
    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <h3>${box.name}</h3>
      <p>${box.items.join(", ")}</p>
      <button onclick="addItem('${box.id}')">Agregar</button>
      <button onclick="deleteBox('${box.id}')">Eliminar</button>
      <button onclick="showQR('${box.id}')">QR</button>
      <div id="qr-${box.id}"></div>
    `;

    container.appendChild(div);
  });
}

window.createBox = function() {
  const name = prompt("Nombre de la caja");
  if(!name) return;

  boxes.push({
    id: Date.now().toString(),
    name,
    items: []
  });

  save();
  render();
}

window.addItem = function(id) {
  const item = prompt("Objeto");
  if(!item) return;

  const box = boxes.find(b => b.id === id);
  box.items.push(item);

  save();
  render();
}

window.deleteBox = function(id) {
  boxes = boxes.filter(b => b.id !== id);
  save();
  render();
}

window.showQR = function(id) {
  const el = document.getElementById("qr-" + id);

  if(typeof QRCode === "undefined"){
    el.innerHTML = "QR no disponible";
    return;
  }

  el.innerHTML = "";
  new QRCode(el, {
    text: location.href + "#box=" + id,
    width: 120,
    height: 120
  });
}

render();

});
</script>

<!-- QR LIBRERÍA SEGURA -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</body>
</html>
